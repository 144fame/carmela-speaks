<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#1e3a5f"/>
  <title>Carmela Speaks</title>
  <style>
    :root {
      --blue: #1e3a5f;
      --blue-mid: #2d5282;
      --accent: #f6c90e;
      --green: #22c55e;
      --red: #ef4444;
      --white: #ffffff;
      --light: #f0f4ff;
      --card-bg: #2d5282;
      --card-hover: #3b6eb5;
      --shadow: 0 4px 16px rgba(0,0,0,0.3);
      --radius: 16px;
      --font-size-btn: clamp(1rem, 3.5vw, 1.5rem);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--blue); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--white); }

    /* HELP ME BUTTON — always on top */
    #helpBtn {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      background: var(--red); color: white;
      border: none; border-radius: 14px;
      padding: 0.6rem 1.1rem;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      font-weight: 900; cursor: pointer;
      box-shadow: 0 4px 20px rgba(239,68,68,0.6);
      animation: pulse 2s infinite;
      letter-spacing: 0.03em;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 4px 20px rgba(239,68,68,0.6);} 50%{box-shadow:0 4px 30px rgba(239,68,68,0.9);} }
    #helpBtn:active { transform: scale(0.95); }

    /* LAYOUT */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* TOP BAR */
    #topbar {
      background: var(--blue-mid);
      padding: 0.6rem 1rem 0.6rem 1rem;
      display: flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    #topbar h1 { font-size: clamp(0.9rem, 3vw, 1.2rem); font-weight: 800; color: var(--accent); letter-spacing: 0.05em; }

    /* SPEECH BAR */
    #speechBar {
      background: #112240;
      padding: 0.6rem 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
      flex-shrink: 0;
      min-height: 56px;
    }
    #speechText {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 0.5rem 0.75rem;
      color: white;
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      min-height: 42px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    #speechText.has-text { border-color: var(--accent); }
    .bar-btn {
      background: var(--card-bg); border: none; border-radius: 12px;
      color: white; font-size: 1.3rem; cursor: pointer;
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .bar-btn:active { transform: scale(0.92); background: var(--card-hover); }
    #speakBtn { background: var(--green); font-size: 1rem; font-weight: 700; width: auto; padding: 0 1rem; }
    #speakBtn.speaking { background: var(--accent); color: var(--blue); animation: speakPulse 0.8s infinite; }
    @keyframes speakPulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

    /* COUNTDOWN OVERLAY */
    #countdownOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(0,0,0,0.85);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
    }
    #countdownOverlay.active { display: flex; }
    #countdownNum {
      font-size: clamp(5rem, 20vw, 10rem); font-weight: 900;
      color: var(--accent); line-height: 1;
      animation: countScale 1s ease-in-out;
    }
    @keyframes countScale { 0%{transform:scale(1.4);opacity:0;} 100%{transform:scale(1);opacity:1;} }
    #countdownLabel { font-size: clamp(1.2rem, 4vw, 1.8rem); color: white; opacity: 0.85; }
    #cancelCountdown {
      margin-top: 1rem; background: var(--red); color: white;
      border: none; border-radius: 14px; padding: 0.75rem 2rem;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
    }

    /* CATEGORY TABS */
    #tabs {
      display: flex; gap: 0.4rem; padding: 0.5rem 0.75rem;
      overflow-x: auto; flex-shrink: 0;
      scrollbar-width: none; -ms-overflow-style: none;
      background: var(--blue);
    }
    #tabs::-webkit-scrollbar { display: none; }
    .tab {
      background: var(--card-bg); border: none; border-radius: 20px;
      color: rgba(255,255,255,0.7); padding: 0.4rem 0.9rem;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem); font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
      flex-shrink: 0;
    }
    .tab.active { background: var(--accent); color: var(--blue); }
    .tab:active { transform: scale(0.95); }

    /* GRID */
    #grid {
      flex: 1; overflow-y: auto; padding: 0.6rem 0.6rem 1rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      align-content: start;
    }
    @media (max-width: 400px) { #grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { #grid { grid-template-columns: repeat(4, 1fr); gap: 0.75rem; } }
    @media (min-width: 1024px) { #grid { grid-template-columns: repeat(5, 1fr); } }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 0.75rem 0.5rem;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.35rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      min-height: 90px;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .card:active { transform: scale(0.93); background: var(--card-hover); border-color: var(--accent); }
    .card.selected { border-color: var(--accent); background: #1a4b8c; }
    .card-emoji { font-size: clamp(1.8rem, 6vw, 2.5rem); line-height: 1; }
    .card-label {
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      font-weight: 600; color: rgba(255,255,255,0.9);
      line-height: 1.2;
    }

    /* QUICK PHRASES special section */
    .phrase-card {
      background: #1a3a6c;
      border-radius: var(--radius);
      padding: 0.65rem 0.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      min-height: 60px;
      text-align: center;
      user-select: none;
    }
    .phrase-card:active { transform: scale(0.94); border-color: var(--accent); }
    .phrase-text { font-size: clamp(0.7rem, 2.2vw, 0.9rem); font-weight: 600; color: white; }
    #phrasesGrid {
      grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 600px) { #phrasesGrid { grid-template-columns: repeat(3, 1fr); } }

    /* HELP overlay */
    #helpOverlay {
      display: none; position: fixed; inset: 0; z-index: 8000;
      background: rgba(239,68,68,0.95);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 1.5rem;
      text-align: center; padding: 2rem;
    }
    #helpOverlay.active { display: flex; }
    #helpOverlay h2 { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; }
    #helpOverlay p { font-size: clamp(1rem, 3.5vw, 1.4rem); opacity: 0.9; max-width: 500px; }
    #closeHelp {
      background: white; color: var(--red); border: none;
      border-radius: 14px; padding: 1rem 2.5rem;
      font-size: 1.2rem; font-weight: 800; cursor: pointer;
    }
    #helpActions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .help-action-btn {
      background: rgba(255,255,255,0.2); color: white;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 12px; padding: 0.75rem 1.5rem;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }

    /* Settings panel */
    #settingsPanel {
      display: none; position: fixed; inset: 0; z-index: 7000;
      background: rgba(0,0,0,0.8); align-items: center; justify-content: center;
    }
    #settingsPanel.active { display: flex; }
    .settings-box {
      background: var(--blue-mid); border-radius: 20px;
      padding: 2rem; width: 90%; max-width: 400px;
      display: flex; flex-direction: column; gap: 1.2rem;
    }
    .settings-box h3 { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
    .setting-row { display: flex; justify-content: space-between; align-items: center; }
    .setting-row label { font-size: 0.95rem; font-weight: 600; }
    .setting-row input[type=range] { width: 140px; }
    .setting-row select { background: var(--blue); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 0.3rem 0.5rem; font-size: 0.9rem; }
    .btn-close-settings { background: var(--accent); color: var(--blue); border: none; border-radius: 10px; padding: 0.65rem 1.5rem; font-weight: 800; cursor: pointer; align-self: flex-end; }
  </style>
</head>
<body>

<!-- HELP ME (always visible) -->
<button id="helpBtn" onclick="showHelp()">🆘 HELP ME</button>

<!-- COUNTDOWN OVERLAY -->
<div id="countdownOverlay">
  <div id="countdownNum">5</div>
  <div id="countdownLabel">Speaking in...</div>
  <button id="cancelCountdown" onclick="cancelCountdown()">✕ Cancel</button>
</div>

<!-- HELP OVERLAY -->
<div id="helpOverlay">
  <div style="font-size:4rem">🆘</div>
  <h2>HELP ME!</h2>
  <p>Carmela needs help right now.</p>
  <div id="helpActions">
    <button class="help-action-btn" onclick="speakText('I need help right now please come to me'); closeHelp()">📢 Say It</button>
    <a href="tel:911" style="text-decoration:none"><button class="help-action-btn">📞 Call 911</button></a>
  </div>
  <button id="closeHelp" onclick="closeHelp()">I'm OK — Go Back</button>
</div>

<!-- SETTINGS -->
<div id="settingsPanel">
  <div class="settings-box">
    <h3>⚙️ Settings</h3>
    <div class="setting-row">
      <label>Speech Rate</label>
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="0.9" oninput="updateRate(this.value)"/>
    </div>
    <div class="setting-row">
      <label>Volume</label>
      <input type="range" id="volSlider" min="0" max="1" step="0.1" value="1" oninput="updateVol(this.value)"/>
    </div>
    <div class="setting-row">
      <label>Voice</label>
      <select id="voiceSelect" onchange="updateVoice()"></select>
    </div>
    <div class="setting-row">
      <label>Countdown</label>
      <input type="range" id="countdownSlider" min="0" max="10" step="1" value="5" oninput="updateCountdown(this.value)"/>
      <span id="countdownVal">5s</span>
    </div>
    <button class="btn-close-settings" onclick="closeSettings()">Done</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="topbar">
    <h1>🦋 Carmela Speaks</h1>
    <div style="flex:1"></div>
    <button class="bar-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>

  <div id="speechBar">
    <div id="speechText" class="speechText"></div>
    <button class="bar-btn" onclick="clearSpeech()" title="Clear">🗑️</button>
    <button class="bar-btn" onclick="deleteLast()" title="Delete last word">⌫</button>
    <button id="speakBtn" class="bar-btn" onclick="triggerSpeak()">▶ SPEAK</button>
  </div>

  <div id="tabs">
    <button class="tab active" onclick="showCategory('needs', this)">🙏 Needs</button>
    <button class="tab" onclick="showCategory('feelings', this)">💭 Feelings</button>
    <button class="tab" onclick="showCategory('body', this)">🫀 Body</button>
    <button class="tab" onclick="showCategory('food', this)">🍎 Food</button>
    <button class="tab" onclick="showCategory('activities', this)">🎮 Activities</button>
    <button class="tab" onclick="showCategory('people', this)">👥 People</button>
    <button class="tab" onclick="showCategory('places', this)">📍 Places</button>
    <button class="tab" onclick="showCategory('phrases', this)">💬 Phrases</button>
  </div>

  <div id="grid"></div>
</div>

<script>
const categories = {
  needs: [
    {e:'💧',l:'Water'},    {e:'🍽️',l:'Food'},      {e:'🚽',l:'Bathroom'},
    {e:'😴',l:'Rest'},     {e:'💊',l:'Medicine'},   {e:'🆘',l:'Help'},
    {e:'📞',l:'Phone'},    {e:'🔥',l:'Too Hot'},    {e:'🥶',l:'Too Cold'},
    {e:'😣',l:'Pain'},     {e:'🛏️',l:'Lie Down'},   {e:'👕',l:'Change Clothes'},
    {e:'🛁',l:'Bath'},     {e:'🦯',l:'Wheelchair'}, {e:'👓',l:'Glasses'},
    {e:'🔊',l:'Louder'},   {e:'🔇',l:'Quiet'},      {e:'💡',l:'Light'},
  ],
  feelings: [
    {e:'😊',l:'Happy'},    {e:'😢',l:'Sad'},        {e:'😡',l:'Angry'},
    {e:'😨',l:'Scared'},   {e:'😩',l:'Frustrated'}, {e:'😴',l:'Tired'},
    {e:'🤢',l:'Sick'},     {e:'😌',l:'Calm'},       {e:'😍',l:'Love'},
    {e:'😐',l:'Okay'},     {e:'🥳',l:'Excited'},    {e:'😞',l:'Upset'},
    {e:'🤔',l:'Confused'}, {e:'😤',l:'Annoyed'},    {e:'🥰',l:'Loved'},
    {e:'😬',l:'Nervous'},  {e:'🤩',l:'Amazed'},     {e:'😶',l:'Nothing'},
  ],
  body: [
    {e:'🤕',l:'Head Hurts'},  {e:'🫀',l:'Chest Pain'}, {e:'🦷',l:'Tooth Hurts'},
    {e:'👁️',l:'Eye Hurts'},   {e:'👂',l:'Ear Hurts'},  {e:'🤧',l:'Nose'},
    {e:'🦴',l:'Bone Pain'},   {e:'🦵',l:'Leg Hurts'},  {e:'🤲',l:'Hand Hurts'},
    {e:'🫁',l:'Hard to Breathe'},{e:'🤮',l:'Nausea'}, {e:'🔥',l:'Fever'},
    {e:'😵',l:'Dizzy'},       {e:'💉',l:'Injection'},  {e:'🩺',l:'Doctor'},
    {e:'🏥',l:'Hospital'},    {e:'💪',l:'Arm Hurts'},  {e:'👣',l:'Foot Hurts'},
  ],
  food: [
    {e:'🍎',l:'Apple'},      {e:'🍌',l:'Banana'},     {e:'🍞',l:'Bread'},
    {e:'🥛',l:'Milk'},       {e:'💧',l:'Water'},       {e:'🧃',l:'Juice'},
    {e:'🍗',l:'Chicken'},    {e:'🥣',l:'Cereal'},      {e:'🍳',l:'Eggs'},
    {e:'🥗',l:'Salad'},      {e:'🍕',l:'Pizza'},       {e:'🍝',l:'Pasta'},
    {e:'🥤',l:'Soda'},       {e:'☕',l:'Coffee'},      {e:'🫖',l:'Tea'},
    {e:'🍰',l:'Cake'},       {e:'🍪',l:'Cookie'},      {e:'🍫',l:'Chocolate'},
    {e:'🥪',l:'Sandwich'},   {e:'🍜',l:'Soup'},        {e:'❌',l:'No Food'},
  ],
  activities: [
    {e:'📺',l:'TV'},          {e:'📱',l:'Phone'},       {e:'🎵',l:'Music'},
    {e:'📖',l:'Read'},        {e:'🎮',l:'Games'},       {e:'🚶',l:'Walk'},
    {e:'🖐️',l:'Hold Hand'},  {e:'🤗',l:'Hug'},         {e:'🙏',l:'Pray'},
    {e:'🧩',l:'Puzzle'},      {e:'✏️',l:'Write'},       {e:'🎨',l:'Draw'},
    {e:'🌳',l:'Outside'},     {e:'🏠',l:'Home'},        {e:'🛒',l:'Shopping'},
    {e:'💆',l:'Massage'},     {e:'🎭',l:'Movie'},       {e:'😴',l:'Sleep'},
  ],
  people: [
    {e:'👩‍⚕️',l:'Nurse'},      {e:'🧑‍⚕️',l:'Doctor'},    {e:'👨',l:'Dad'},
    {e:'👩',l:'Mom'},         {e:'👧',l:'Sister'},      {e:'👦',l:'Brother'},
    {e:'👵',l:'Grandma'},     {e:'👴',l:'Grandpa'},     {e:'👫',l:'Friend'},
    {e:'🧑',l:'Caregiver'},   {e:'🧑‍🏫',l:'Teacher'},   {e:'👩‍👧',l:'Family'},
    {e:'🚑',l:'Ambulance'},   {e:'👮',l:'Police'},      {e:'🙋',l:'Me'},
  ],
  places: [
    {e:'🏠',l:'Home'},        {e:'🏥',l:'Hospital'},    {e:'🚿',l:'Bathroom'},
    {e:'🛏️',l:'Bedroom'},     {e:'🍽️',l:'Kitchen'},     {e:'🛋️',l:'Living Room'},
    {e:'🚗',l:'Car'},         {e:'🏫',l:'School'},      {e:'🏪',l:'Store'},
    {e:'🌳',l:'Outside'},     {e:'🏖️',l:'Park'},        {e:'⛪',l:'Church'},
    {e:'🏋️',l:'Therapy'},     {e:'💈',l:'Salon'},       {e:'🚪',l:'Door'},
  ],
  phrases: [
    'Yes please',            'No thank you',          'I need help',
    'I am okay',             'I want to go home',     'I love you',
    'Please stop',           'I am in pain',          'Call my family',
    'I am hungry',           'I am thirsty',          'I need to use the bathroom',
    'Please be quiet',       'Can you help me?',      'I feel sick',
    'I understand',          'I do not understand',   'Please wait',
    'Thank you',             'I am cold',             'I am hot',
    'Please turn on the TV', 'I want music',          'I need my medicine',
  ]
};

let currentText = '';
let speechRate = 0.9;
let speechVol = 1;
let selectedVoice = null;
let countdownSecs = 5;
let countdownTimer = null;
let countdownCurrent = 0;

const speechTextEl = document.getElementById('speechText');
const speakBtn = document.getElementById('speakBtn');

// Voices
function loadVoices() {
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = voices.map((v,i) => `<option value="${i}">${v.name}</option>`).join('');
  // prefer female voice
  const femIdx = voices.findIndex(v => /female|woman|karen|samantha|victoria|zira|hazel/i.test(v.name));
  if (femIdx >= 0) { sel.value = femIdx; selectedVoice = voices[femIdx]; }
  else if (voices.length) selectedVoice = voices[0];
}
speechSynthesis.onvoiceschanged = loadVoices;
window.addEventListener('load', () => setTimeout(loadVoices, 300));

function updateVoice() {
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  selectedVoice = voices[document.getElementById('voiceSelect').value];
}
function updateRate(v) { speechRate = parseFloat(v); }
function updateVol(v) { speechVol = parseFloat(v); }
function updateCountdown(v) {
  countdownSecs = parseInt(v);
  document.getElementById('countdownVal').textContent = v + 's';
}

// Speak
function speakText(text) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = speechRate;
  utt.volume = speechVol;
  if (selectedVoice) utt.voice = selectedVoice;
  utt.onstart = () => { speakBtn.textContent = '⏹ STOP'; speakBtn.classList.add('speaking'); };
  utt.onend = () => { speakBtn.textContent = '▶ SPEAK'; speakBtn.classList.remove('speaking'); };
  speechSynthesis.speak(utt);
}

function addWord(word) {
  if (currentText) currentText += ' ' + word;
  else currentText = word;
  speechTextEl.textContent = currentText;
  speechTextEl.classList.add('has-text');
  if (countdownSecs > 0) triggerSpeak();
}

function triggerSpeak() {
  if (countdownTimer) cancelCountdown();
  if (!currentText.trim()) return;
  if (countdownSecs === 0) { speakNow(); return; }
  // Start countdown
  countdownCurrent = countdownSecs;
  const overlay = document.getElementById('countdownOverlay');
  const numEl = document.getElementById('countdownNum');
  numEl.textContent = countdownCurrent;
  overlay.classList.add('active');
  countdownTimer = setInterval(() => {
    countdownCurrent--;
    numEl.textContent = countdownCurrent;
    numEl.style.animation = 'none';
    numEl.offsetHeight; // reflow
    numEl.style.animation = 'countScale 0.8s ease-in-out';
    if (countdownCurrent <= 0) {
      cancelCountdown();
      speakNow();
    }
  }, 1000);
}

function cancelCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  document.getElementById('countdownOverlay').classList.remove('active');
}

function speakNow() {
  if (currentText.trim()) speakText(currentText);
}

function clearSpeech() {
  cancelCountdown();
  speechSynthesis.cancel();
  currentText = '';
  speechTextEl.textContent = '';
  speechTextEl.classList.remove('has-text');
  speakBtn.textContent = '▶ SPEAK';
  speakBtn.classList.remove('speaking');
}

function deleteLast() {
  const words = currentText.trim().split(' ');
  words.pop();
  currentText = words.join(' ');
  speechTextEl.textContent = currentText;
  if (!currentText) speechTextEl.classList.remove('has-text');
}

// Category rendering
function showCategory(cat, tabEl) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.id = cat === 'phrases' ? 'phrasesGrid' : 'grid';
  grid.style.gridTemplateColumns = '';

  if (cat === 'phrases') {
    grid.style.gridTemplateColumns = 'repeat(2, 1fr)';
    categories.phrases.forEach(phrase => {
      const card = document.createElement('div');
      card.className = 'phrase-card';
      card.innerHTML = `<div class="phrase-text">${phrase}</div>`;
      card.addEventListener('click', () => addWord(phrase));
      grid.appendChild(card);
    });
  } else {
    categories[cat].forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-emoji">${item.e}</div><div class="card-label">${item.l}</div>`;
      card.addEventListener('click', () => addWord(item.l));
      grid.appendChild(card);
    });
  }
}

// Help
function showHelp() {
  document.getElementById('helpOverlay').classList.add('active');
}
function closeHelp() {
  document.getElementById('helpOverlay').classList.remove('active');
}

// Settings
function openSettings() {
  document.getElementById('settingsPanel').classList.add('active');
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('active');
}

// Init
showCategory('needs', null);
document.querySelector('.tab').classList.add('active');

// Prevent sleep on iOS (requires user gesture first)
document.addEventListener('touchstart', () => {
  if (speechSynthesis.paused) speechSynthesis.resume();
}, { once: true });
</script>
</body>
